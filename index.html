<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="features/script.js"></script>
    <link rel="stylesheet" href="style.css" />
    <title>Typing Test</title>
  </head>
  <body>
    <header>
      <img src="./typing-speed-test-main/assets/images/logo-small.svg" alt="" />

      <div>
        <img
          src="./typing-speed-test-main/assets/images/icon-personal-best.svg"
          alt=""
        />
        <span>Best:</span>
        <span>92 WPM</span>
      </div>
    </header>
    <nav>
      <div class="container-1">
        <span id="accuracy">100%</span>
        <span id="wpm">0</span>
        <span id="time">00:00:00</span>
      </div>

      <select title="difficulty" id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>

      <select title="format" id="format">
        <option value="60s">60s</option>
        <option value="passage">Passage</option>
      </select>
    </nav>
    <main>
      <div class="overlay">
        <button id="start">start typing test</button>
        <span>Or click the text and start typing</span>
      </div>

      <div id="text" class="not-started"></div>

      <button id="restart" class="hidden">
        Restart Test
        <img
          src="./typing-speed-test-main/assets/images/icon-restart.svg"
          alt=""
        />
      </button>
    </main>
  </body>
</html>
